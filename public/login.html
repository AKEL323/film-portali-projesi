<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Kayıt Ol</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #1f1f1f; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #e50914; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; background-color: #333; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #e50914; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #f40612; }
        .toggle-link { text-align: center; display: block; margin-top: 15px; color: #aaa; cursor: pointer; text-decoration: underline; }
        .mesaj { text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="girisAlani">
            <h2>Giriş Yap</h2>
            <form id="girisFormu">
                <label>E-posta:</label>
                <input type="email" id="girisEmail" required>
                <label>Şifre:</label>
                <input type="password" id="girisSifre" required>
                <button type="submit">Giriş Yap</button>
            </form>
            <span class="toggle-link" onclick="formDegistir('kayit')">Hesabın yok mu? Kayıt Ol</span>
        </div>

        <div id="kayitAlani" style="display: none;">
            <h2>Kayıt Ol</h2>
            <form id="kayitFormu">
                <label>Kullanıcı Adı:</label>
                <input type="text" id="kayitUsername" required>
                <label>E-posta:</label>
                <input type="email" id="kayitEmail" required>
                <label>Şifre:</label>
                <input type="password" id="kayitSifre" required>
                <button type="submit">Kayıt Ol</button>
            </form>
            <span class="toggle-link" onclick="formDegistir('giris')">Zaten hesabın var mı? Giriş Yap</span>
        </div>

        <p id="bilgiMesaji" class="mesaj"></p>
        <a href="/" style="display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none;">← Ana Sayfaya Dön</a>
    </div>

    <script>
        // Formlar arası (Giriş / Kayıt) geçiş yapma fonksiyonu
        function formDegistir(hedef) {
            document.getElementById('girisAlani').style.display = hedef === 'giris' ? 'block' : 'none';
            document.getElementById('kayitAlani').style.display = hedef === 'kayit' ? 'block' : 'none';
            document.getElementById('bilgiMesaji').style.display = 'none';
        }

        // Kullanıcıya yeşil/kırmızı mesaj gösterme fonksiyonu
        function mesajGoster(metin, renk) {
            const msj = document.getElementById('bilgiMesaji');
            msj.textContent = metin;
            msj.style.color = renk;
            msj.style.display = 'block';
        }

        // KAYIT OL BUTONUNA BASILDIĞINDA
        document.getElementById('kayitFormu').addEventListener('submit', async (e) => {
            e.preventDefault(); // Sayfanın yenilenmesini engelle
            
            // Formdaki verileri al
            const veri = {
                username: document.getElementById('kayitUsername').value,
                email: document.getElementById('kayitEmail').value,
                password: document.getElementById('kayitSifre').value
            };

            // Backend'e gönder
            try {
                const cevap = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });
                const sonuc = await cevap.json();

                if(cevap.ok) {
                    mesajGoster("Kayıt başarılı! Şimdi giriş yapabilirsiniz.", "#4caf50");
                    document.getElementById('kayitFormu').reset();
                    setTimeout(() => formDegistir('giris'), 2000); // 2 saniye sonra otomatik giriş formuna at
                } else {
                    mesajGoster(sonuc.hata || "Kayıt başarısız.", "#f44336");
                }
            } catch (hata) {
                mesajGoster("Sunucu ile iletişim kurulamadı.", "#f44336");
            }
        });

        // GİRİŞ YAP BUTONUNA BASILDIĞINDA
        document.getElementById('girisFormu').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const veri = {
                email: document.getElementById('girisEmail').value,
                password: document.getElementById('girisSifre').value
            };

            try {
                const cevap = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });
                const sonuc = await cevap.json();

                if(cevap.ok) {
                    mesajGoster("Giriş başarılı! Yönlendiriliyorsunuz...", "#4caf50");
                    
                    // Tarayıcının hafızasına kullanıcının adını kaydediyoruz (Yorum yaparken "Merhaba Furkan" demek için lazım olacak)
                    localStorage.setItem('kullaniciAdim', sonuc.username); 
                    
                    setTimeout(() => window.location.href = '/', 1500); // 1.5 saniye sonra Ana sayfaya yönlendir
                } else {
                    mesajGoster(sonuc.hata || "Giriş başarısız. Bilgilerinizi kontrol edin.", "#f44336");
                }
            } catch (hata) {
                mesajGoster("Sunucu ile iletişim kurulamadı.", "#f44336");
            }
        });
    </script>
</body>
</html>
