<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Film Blogum</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Kullanıcı Giriş Barı Tasarımı */
        #authBar { background-color: #111; padding: 10px 20px; text-align: right; border-bottom: 1px solid #333; font-size: 14px; }
        .btn-giris { background-color: #e50914; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-cikis { background-color: #555; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        
        header { background-color: #1f1f1f; padding: 20px; text-align: center; border-bottom: 2px solid #e50914; }
        h1 { margin: 0; color: #e50914; }
        main { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .film-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .film-kart { background-color: #1f1f1f; padding: 15px; border-radius: 8px; width: 250px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="authBar">
        </div>

    <header>
        <h1>🎬 Film Portalı</h1>
        <p>En güncel filmler, yorumlar ve incelemeler</p>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Popüler Filmler</h2>
            <a href="/ekle" style="background-color: #4caf50; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold;">+ Yeni Film Ekle</a>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <input type="text" id="aramaKutusu" placeholder="Film adı ara..." style="flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #333; background-color: #222; color: white; font-size: 16px;">
            <select id="turFiltresi" style="padding: 12px; border-radius: 4px; border: 1px solid #333; background-color: #222; color: white; font-size: 16px;">
                <option value="">Tüm Türler</option>
                <option value="Aksiyon">Aksiyon</option>
                <option value="Bilim Kurgu">Bilim Kurgu</option>
                <option value="Dram">Dram</option>
                <option value="Komedi">Komedi</option>
            </select>
            <button onclick="filmleriGetir()" style="background-color: #e50914; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;">Ara</button>
        </div>

        <div class="film-container">
            <div class="film-kart">
                <h3>Yükleniyor...</h3>
            </div>
        </div>
    </main>

    <script>
        // 1. KULLANICI GİRİŞ DURUMUNU KONTROL ETME
        function authDurumunuKontrolEt() {
            // Giriş yaparken tarayıcıya kaydettiğimiz ismi alıyoruz
            const kullaniciAdim = localStorage.getItem('kullaniciAdim');
            const authBar = document.getElementById('authBar');
            
            if (kullaniciAdim) {
                // Giriş yapılmışsa Merhaba yaz ve Çıkış butonunu göster
                authBar.innerHTML = `
                    <span style="color: #aaa; margin-right: 15px;">Merhaba, <b style="color: white;">${kullaniciAdim}</b></span>
                    <button onclick="cikisYap()" class="btn-cikis">Çıkış Yap</button>
                `;
            } else {
                // Giriş yapılmamışsa Giriş Yap butonunu göster
                authBar.innerHTML = `<a href="/login" class="btn-giris">Giriş Yap / Kayıt Ol</a>`;
            }
        }

        // 2. ÇIKIŞ YAPMA FONKSİYONU
        function cikisYap() {
            localStorage.removeItem('kullaniciAdim'); // Hafızadan sil
            window.location.reload(); // Sayfayı yenile
        }

        // 3. FİLMLERİ GETİRME (Eski kodumuz)
        async function filmleriGetir() {
            const container = document.querySelector('.film-container');
            const aramaKelimesi = document.getElementById('aramaKutusu') ? document.getElementById('aramaKutusu').value : '';
            const secilenTur = document.getElementById('turFiltresi') ? document.getElementById('turFiltresi').value : '';
            
            try {
                const cevap = await fetch(`/api/movies?aranankelime=${aramaKelimesi}&tur=${secilenTur}`);
                const filmler = await cevap.json();
                container.innerHTML = '';
                
                if (filmler.length === 0) {
                    container.innerHTML = '<p style="color: #aaa;">Aradığınız kritere uygun film bulunamadı.</p>';
                    return;
                }

                filmler.forEach(film => {
                    const kart = document.createElement('div');
                    kart.className = 'film-kart';
                    kart.innerHTML = `
                        <h3 style="color: #e50914; margin-top: 0;">${film.title}</h3>
                        <p style="color: #aaa; font-size: 14px;">🎭 Tür: ${film.genre} | ⭐ Puan: ${film.rating}</p>
                        <p style="font-size: 15px;">${film.description.substring(0, 100)}...</p>
                        <button onclick="window.location.href='/detay.html?id=${film._id}'" style="background-color: #e50914; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; width: 100%;">Detayları Gör</button>
                    `;
                    container.appendChild(kart);
                });
            } catch (hata) {
                container.innerHTML = '<p>Filmler yüklenirken bir hata oluştu.</p>';
            }
        }

        // Sayfa açıldığında fonksiyonları çalıştır
        authDurumunuKontrolEt();
        filmleriGetir();
    </script>
</body>
</html>
